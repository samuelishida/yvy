version: '3'
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - '3000:3000'
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USERNAME:-root}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
      MONGO_DATABASE: ${MONGO_DATABASE:-terrabrasilis_data}
      MONGO_APP_USERNAME: ${MONGO_APP_USERNAME:-yvy_app}
      MONGO_APP_PASSWORD: ${MONGO_APP_PASSWORD}
      MONGO_READONLY_USERNAME: ${MONGO_READONLY_USERNAME:-yvy_readonly}
      MONGO_READONLY_PASSWORD: ${MONGO_READONLY_PASSWORD}
    expose:
      - "27017"
    volumes:
      - ./mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
      - ./mongo_data:/data/db  # Volume local para garantir persistência
    networks:
      - app-network
    deploy:
      resources:
        limits:
          cpus: '12.0'
          memory: 24G
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build: ./frontend
    container_name: frontend
    environment:
      BACKEND_URL: ${BACKEND_URL:-http://backend:5000}
      API_KEY: ${API_KEY}
      DEV: ${DEV:-0}
    ports:
      - "5001:5001"
    volumes:
      - ./frontend:/app
    depends_on:
      backend:
        condition: service_healthy
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network
    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: 8G

  backend:
    build: ./backend
    container_name: backend
    environment:
      MONGO_URI: ${MONGO_URI:-}
      MONGO_DATABASE: ${MONGO_DATABASE:-terrabrasilis_data}
      MONGO_HOST: mongo
      MONGO_PORT: 27017
      MONGO_APP_USERNAME: ${MONGO_APP_USERNAME:-yvy_app}
      MONGO_APP_PASSWORD: ${MONGO_APP_PASSWORD}
      MONGO_ROOT_USERNAME: ${MONGO_ROOT_USERNAME:-root}
      MONGO_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
      AUTH_REQUIRED: ${AUTH_REQUIRED:-1}
      API_KEY: ${API_KEY}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5001,http://127.0.0.1:5001}
      RATE_LIMIT_REQUESTS: ${RATE_LIMIT_REQUESTS:-60}
      RATE_LIMIT_WINDOW_SECONDS: ${RATE_LIMIT_WINDOW_SECONDS:-60}
      DEV: ${DEV:-0}
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/app
    depends_on:
      mongo:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network
    deploy:
      resources:
        limits:
          cpus: '12.0'
          memory: 24G

  mongo:
    image: mongo:6.0
    ports:
      - '27017:27017'
    volumes:
      - mongo-data:/data/db

volumes:
  mongo-data:
