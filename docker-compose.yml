version: '3.8'

services:
  mongo:
    image: mongo:latest
    container_name: mongo
    environment:
      MONGO_DATABASE: ${MONGO_DATABASE:-terrabrasilis_data}
    expose:
      - "27017"
    volumes:
      - ./mongo_data:/data/db
    networks:
      - app-network
    deploy:
      resources:
        limits:
          cpus: '12.0'
          memory: 24G
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build: ./frontend
    container_name: frontend
    environment:
      BACKEND_URL: ${BACKEND_URL:-http://backend:5000}
      API_KEY: ${API_KEY}
      PORT: 5001
    ports:
      - "5001:5001"
    depends_on:
      backend:
        condition: service_healthy
    restart: always
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5001/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G

  backend:
    build: ./backend
    container_name: backend
    environment:
      MONGO_URI: mongodb://mongo:27017/terrabrasilis_data
      MONGO_DATABASE: ${MONGO_DATABASE:-terrabrasilis_data}
      MONGO_HOST: mongo
      MONGO_PORT: 27017
      AUTH_REQUIRED: ${AUTH_REQUIRED:-0}
      API_KEY: ${API_KEY}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5001,http://127.0.0.1:5001,http://localhost:3000}
      NEWS_API_KEY: ${NEWS_API_KEY}
      RATE_LIMIT_REQUESTS: ${RATE_LIMIT_REQUESTS:-60}
      RATE_LIMIT_WINDOW_SECONDS: ${RATE_LIMIT_WINDOW_SECONDS:-60}
      DEV: ${DEV:-0}
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/app
    depends_on:
      mongo:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network
    deploy:
      resources:
        limits:
          cpus: '12.0'
          memory: 24G

networks:
  app-network:
    driver: bridge
