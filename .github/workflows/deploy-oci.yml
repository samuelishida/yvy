name: Deploy to OCI

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

env:
  TF_VAR_tenancy_ocid: ${{ secrets.OCI_TENANCY_OCID }}
  TF_VAR_user_ocid: ${{ secrets.OCI_USER_OCID }}
  TF_VAR_fingerprint: ${{ secrets.OCI_FINGERPRINT }}
  TF_VAR_private_key_path: ./oci_api_key.pem
  TF_VAR_region: ${{ secrets.OCI_REGION || 'sa-saopaulo-1' }}
  TF_VAR_compartment_ocid: ${{ secrets.OCI_COMPARTMENT_OCID || secrets.OCI_TENANCY_OCID }}
  TF_VAR_ssh_public_key_path: ./oci_ssh_key.pub

jobs:
  terraform:
    name: Terraform Infra
    runs-on: ubuntu-latest
    outputs:
      public_ip: ${{ steps.tf_outputs.outputs.public_ip }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.0"

      - name: Write OCI API Key
        run: |
          printf '%s\n' "${{ secrets.OCI_PRIVATE_KEY }}" > infra/oci_api_key.pem
          chmod 600 infra/oci_api_key.pem
          # Verify key format
          head -1 infra/oci_api_key.pem | grep -q 'BEGIN' || {
            echo "ERROR: Private key format invalid. Ensure secret has literal newlines."
            exit 1
          }

      - name: Verify OCI credentials
        working-directory: ./infra
        run: |
          echo "Region: $TF_VAR_region"
          echo "Tenancy: ${TF_VAR_tenancy_ocid:0:20}..."
          echo "User: ${TF_VAR_user_ocid:0:20}..."
          echo "Fingerprint: $TF_VAR_fingerprint"
          echo "Key file exists: $(test -f oci_api_key.pem && echo yes || echo no)"
          echo "Key first line: $(head -1 oci_api_key.pem)"
          # Compute fingerprint from key to verify match
          openssl rsa -in oci_api_key.pem -pubout -outform DER 2>/dev/null | openssl md5 -c | awk '{print $2}' || echo "WARNING: Could not compute fingerprint from key"

      - name: Write SSH Public Key
        run: |
          echo "${{ secrets.OCI_SSH_PUBLIC_KEY }}" > infra/oci_ssh_key.pub

      - name: Terraform Init
        working-directory: ./infra
        run: terraform init

      - name: Terraform Plan
        working-directory: ./infra
        run: terraform plan -out=tfplan

      - name: Terraform Apply
        working-directory: ./infra
        run: terraform apply -auto-approve tfplan

      - name: Extract Outputs
        id: tf_outputs
        working-directory: ./infra
        run: |
          PUBLIC_IP=$(terraform output -raw instance_public_ip)
          echo "public_ip=$PUBLIC_IP" >> "$GITHUB_OUTPUT"
          echo "Instance IP: $PUBLIC_IP"

      - name: Save Terraform State
        uses: actions/upload-artifact@v4
        with:
          name: terraform-state
          path: infra/terraform.tfstate
          retention-days: 30

  ansible:
    name: Ansible Deploy
    runs-on: ubuntu-latest
    needs: terraform
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Ansible + OCI Collection
        run: |
          pip install ansible

      - name: Write SSH Private Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.OCI_SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ needs.terraform.outputs.public_ip }} >> ~/.ssh/known_hosts

      - name: Run Ansible Playbook
        working-directory: ./ansible
        env:
          ANSIBLE_HOST_KEY_CHECKING: "False"
        run: |
          # Criar inventory inline com o IP dinâmico
          cat > inventory.ini <<EOF
          [yvy]
          ${{ needs.terraform.outputs.public_ip }} ansible_user=ubuntu ansible_ssh_private_key_file=~/.ssh/id_rsa
          EOF

          ansible-playbook -i inventory.ini playbook.yml

      - name: Health Check
        run: |
          echo "Aguardando aplicação ficar pronta..."
          sleep 30
          curl -sf http://${{ needs.terraform.outputs.public_ip }}:5001/health || exit 1
          echo "✅ Yvy deployado com sucesso!"
          echo "🌐 URL: http://${{ needs.terraform.outputs.public_ip }}:5001"
