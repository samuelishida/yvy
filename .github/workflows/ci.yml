name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Compile Python sources
        run: |
          python -m py_compile backend/backend.py backend/db_sqlite.py backend/ingest_sqlite.py backend/news_sqlite.py

      - name: Run SQLite manual tests
        working-directory: ./backend
        run: python test_sqlite_manual.py

      - name: Install pytest and run suite
        working-directory: ./backend
        run: |
          pip install pytest pytest-asyncio
          python -m pytest test_db_sqlite.py -v

      - name: Validate shell scripts
        run: |
          sh -n backup.sh
          sh -n scripts/setup-local.sh
          sh -n scripts/run-backend.sh
          sh -n scripts/run-frontend.sh
          sh -n scripts/deploy-local.sh
          sh -n scripts/deploy-nginx.sh