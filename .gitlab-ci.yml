stages:
  - test

python-tests:
  stage: test
  image: python:3.13
  before_script:
    - python -m pip install --upgrade pip
    - pip install -r backend/requirements-dev.txt
    - pip install -r backend/requirements.txt
  script:
    - pytest -q backend/tests
    - python -m py_compile backend/backend.py backend/db_sqlite.py backend/ingest_sqlite.py backend/news_sqlite.py main.py gpw.py

shell-and-js-validation:
  stage: test
  image: node:20
  script:
    - sh -n backup.sh
    - sh -n scripts/setup-local.sh
