---
- name: Deploy Yvy na OCI
  hosts: yvy
  become: true
  vars:
    app_dir: /opt/yvy
    repo_url: https://github.com/samuelishida/yvy.git
    yvy_user: ubuntu
    yvy_group: ubuntu

  tasks:
    - name: Instalar dependencias de runtime baremetal
      ansible.builtin.apt:
        update_cache: true
        name:
          - git
          - python3
          - python3-venv
          - python3-pip
          - nodejs
          - npm
          - redis-server
          - sqlite3
        state: present

    - name: Garantir Redis ativo
      ansible.builtin.systemd:
        name: redis-server
        state: started
        enabled: true

    - name: Criar diretorio da aplicacao
      ansible.builtin.file:
        path: "{{ app_dir }}"
        state: directory
        owner: "{{ yvy_user }}"
        group: "{{ yvy_group }}"
        mode: '0755'

    - name: Clonar repositório Yvy
      ansible.builtin.git:
        repo: "{{ repo_url }}"
        dest: "{{ app_dir }}"
        version: main
        force: yes
      become_user: "{{ yvy_user }}"

    - name: Gerar secrets se .env não existir
      ansible.builtin.command:
        cmd: bash scripts/generate-secrets.sh
        chdir: "{{ app_dir }}"
      become_user: "{{ yvy_user }}"
      args:
        creates: "{{ app_dir }}/.env"

    - name: Rodar setup local (venv + node_modules)
      ansible.builtin.command:
        cmd: bash scripts/setup-local.sh
        chdir: "{{ app_dir }}"
      become_user: "{{ yvy_user }}"

    - name: Criar unidade systemd do backend
      ansible.builtin.template:
        src: yvy-backend.service.j2
        dest: /etc/systemd/system/yvy-backend.service
        owner: root
        group: root
        mode: '0644'

    - name: Criar unidade systemd do frontend
      ansible.builtin.template:
        src: yvy-frontend.service.j2
        dest: /etc/systemd/system/yvy-frontend.service
        owner: root
        group: root
        mode: '0644'

    - name: Recarregar systemd
      ansible.builtin.systemd:
        daemon_reload: true

    - name: Ativar e iniciar backend
      ansible.builtin.systemd:
        name: yvy-backend
        state: restarted
        enabled: true

    - name: Ativar e iniciar frontend
      ansible.builtin.systemd:
        name: yvy-frontend
        state: restarted
        enabled: true

    - name: Aguardar backend ficar saudável
      ansible.builtin.uri:
        url: http://localhost:5000/health
        status_code: 200
      register: backend_health
      until: backend_health.status == 200
      retries: 30
      delay: 5

    - name: Verificar health do frontend
      ansible.builtin.uri:
        url: http://localhost:5001/health
        status_code: 200
      register: frontend_health
      until: frontend_health.status == 200
      retries: 10
      delay: 3

    - name: Mostrar URL de acesso
      ansible.builtin.debug:
        msg: "Yvy disponível em: http://{{ ansible_host }}:5001"
