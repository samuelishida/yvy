---
- name: Deploy Yvy na OCI
  hosts: yvy
  become: true
  vars:
    app_dir: /opt/yvy
    repo_url: https://github.com/samuelishida/yvy.git
    yvy_user: ubuntu
    yvy_group: ubuntu
    nvm_dir: "/home/{{ yvy_user }}/.nvm"
    node_version: "18"
    domain: "yvy.app.br"
    certbot_email: "samuel.ishida@gmail.com"

  tasks:
    - name: Instalar dependencias de runtime baremetal
      ansible.builtin.apt:
        update_cache: true
        name:
          - git
          - python3
          - python3-venv
          - python3-pip
          - redis-server
          - sqlite3
          - curl
          - nginx
          - certbot
          - python3-certbot-nginx
        state: present

    - name: Garantir Redis ativo
      ansible.builtin.systemd:
        name: redis-server
        state: started
        enabled: true

    - name: Garantir swap para VM 1GB
      ansible.builtin.shell:
        cmd: |
          swapon --show | grep -q /swapfile || {
            fallocate -l 2G /swapfile &&
            chmod 600 /swapfile &&
            mkswap /swapfile &&
            swapon /swapfile &&
            echo '/swapfile none swap sw 0 0' >> /etc/fstab
          }
      changed_when: false

    - name: Criar diretorio para ACME challenges
      ansible.builtin.file:
        path: /var/www/certbot
        state: directory
        owner: www-data
        group: www-data
        mode: '0755'

    - name: Verificar se nvm esta instalado
      ansible.builtin.stat:
        path: "{{ nvm_dir }}/nvm.sh"
      register: nvm_installed

    - name: Instalar nvm
      when: not nvm_installed.stat.exists
      ansible.builtin.shell:
        cmd: |
          curl -o- https://raw.githubusercontent.com/nvm-sh/nvm/v0.39.7/install.sh | bash
        args:
          creates: "{{ nvm_dir }}/nvm.sh"
      become_user: "{{ yvy_user }}"

    - name: Instalar Node {{ node_version }} via nvm
      ansible.builtin.shell:
        cmd: |
          export NVM_DIR="{{ nvm_dir }}"
          [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
          nvm install {{ node_version }}
          nvm alias default {{ node_version }}
        executable: /bin/bash
      become_user: "{{ yvy_user }}"
      register: node_install
      changed_when: "'already installed' not in node_install.stdout"

    - name: Obter caminho do Node bin
      ansible.builtin.shell:
        cmd: |
          export NVM_DIR="{{ nvm_dir }}"
          [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
          which node
        executable: /bin/bash
      become_user: "{{ yvy_user }}"
      register: node_path_result
      changed_when: false

    - name: Criar diretorio da aplicacao
      ansible.builtin.file:
        path: "{{ app_dir }}"
        state: directory
        owner: "{{ yvy_user }}"
        group: "{{ yvy_group }}"
        mode: '0755'

    - name: Corrigir ownership do diretorio da aplicacao
      ansible.builtin.file:
        path: "{{ app_dir }}"
        state: directory
        owner: "{{ yvy_user }}"
        group: "{{ yvy_group }}"
        recurse: yes

    - name: Clonar repositório Yvy
      ansible.builtin.git:
        repo: "{{ repo_url }}"
        dest: "{{ app_dir }}"
        version: main
        force: yes
      become_user: "{{ yvy_user }}"

    - name: Gerar secrets se .env não existir
      ansible.builtin.command:
        cmd: bash scripts/generate-secrets.sh
        chdir: "{{ app_dir }}"
      become_user: "{{ yvy_user }}"
      args:
        creates: "{{ app_dir }}/.env"

    - name: Configurar CORS_ORIGINS no .env
      ansible.builtin.lineinfile:
        path: "{{ app_dir }}/.env"
        regexp: "^CORS_ORIGINS=.*"
        line: "CORS_ORIGINS=http://{{ ansible_host }}:5001,http://localhost:5001"
        create: true
      become_user: "{{ yvy_user }}"

    - name: Rodar setup local (venv + node_modules)
      ansible.builtin.command:
        cmd: bash scripts/setup-local.sh
        chdir: "{{ app_dir }}"
      become_user: "{{ yvy_user }}"

    - name: Build frontend (produzir static build/)
      ansible.builtin.shell:
        cmd: |
          export NVM_DIR="{{ nvm_dir }}"
          [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
          cd {{ app_dir }}/frontend
          npm run build
        executable: /bin/bash
      become_user: "{{ yvy_user }}"

    - name: Criar unidade systemd do backend
      ansible.builtin.template:
        src: yvy-backend.service.j2
        dest: /etc/systemd/system/yvy-backend.service
        owner: root
        group: root
        mode: '0644'

    - name: Criar unidade systemd do frontend
      ansible.builtin.template:
        src: yvy-frontend.service.j2
        dest: /etc/systemd/system/yvy-frontend.service
        owner: root
        group: root
        mode: '0644'

    - name: Recarregar systemd
      ansible.builtin.systemd:
        daemon_reload: true

    - name: Ativar e iniciar backend
      ansible.builtin.systemd:
        name: yvy-backend
        state: restarted
        enabled: true

    - name: Ativar e iniciar frontend
      ansible.builtin.systemd:
        name: yvy-frontend
        state: restarted
        enabled: true

    - name: Aguardar backend ficar saudável
      ansible.builtin.uri:
        url: http://localhost:5000/health
        status_code: 200
      register: backend_health
      until: backend_health.status == 200
      retries: 30
      delay: 5

    - name: Verificar health do frontend
      ansible.builtin.uri:
        url: http://localhost:5001/
        status_code: 200
      register: frontend_health
      until: frontend_health.status == 200
      retries: 15
      delay: 5

    - name: Obter API_KEY do .env para nginx
      ansible.builtin.shell:
        cmd: grep '^API_KEY=' {{ app_dir }}/.env | cut -d= -f2
      register: api_key_result
      changed_when: false

    - name: Deploy nginx config (HTTPS with HTTP redirect)
      vars:
        api_key: "{{ api_key_result.stdout }}"
      ansible.builtin.template:
        src: yvy-nginx.conf.j2
        dest: /etc/nginx/sites-available/yvy
        owner: root
        group: root
        mode: '0644'
      notify: reload nginx

    - name: Habilitar site nginx
      ansible.builtin.file:
        src: /etc/nginx/sites-available/yvy
        dest: /etc/nginx/sites-enabled/yvy
        state: link
      notify: reload nginx

    - name: Remover configs obsoletas do nginx
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - /etc/nginx/sites-enabled/default
        - /etc/nginx/sites-enabled/yvy-temp
        - /etc/nginx/sites-available/yvy-temp
        - /etc/nginx/sites-available/yvy-ssl
      notify: reload nginx

    - name: Verificar certificado SSL existe
      ansible.builtin.stat:
        path: /etc/letsencrypt/live/{{ domain }}/fullchain.pem
      register: ssl_cert

    - name: Solicitar certificado SSL Let's Encrypt (se nao existir)
      when: not ssl_cert.stat.exists
      ansible.builtin.shell:
        cmd: |
          certbot certonly --webroot \
            --webroot-path=/var/www/certbot \
            --email "{{ certbot_email }}" \
            --agree-tos \
            --no-eff-email \
            --non-interactive \
            -d "{{ domain }}" \
            -d "www.{{ domain }}"
      ignore_errors: true
      register: cert_result

    - name: Configurar renew automático do SSL
      ansible.builtin.copy:
        dest: /etc/cron.d/certbot-renew
        content: |
          0 3 1 * * root certbot renew --quiet --deploy-hook "systemctl reload nginx"
        owner: root
        group: root
        mode: '0644'

    - name: Parar frontend Node.js (liberar RAM)
      ansible.builtin.systemd:
        name: yvy-frontend
        state: stopped
        enabled: false
      ignore_errors: true

    - name: Testar backend health
      ansible.builtin.uri:
        url: "http://localhost:5000/health"
        status_code: 200
      register: backend_health_check
      until: backend_health_check.status == 200
      retries: 5
      delay: 5

    - name: Testar frontend via nginx HTTPS
      ansible.builtin.uri:
        url: "https://{{ domain }}/"
        status_code: 200
        validate_certs: false
      register: frontend_health_check
      until: frontend_health_check.status == 200
      retries: 5
      delay: 5

    - name: Mostrar URL de acesso
      ansible.builtin.debug:
        msg: |
          ✅ Yvy disponível em: https://{{ domain }}
          Backend health: https://{{ domain }}/health
          API: https://{{ domain }}/api/

  handlers:
    - name: reload nginx
      ansible.builtin.systemd:
        name: nginx
        state: reloaded
