plugin: oracle.oci.oci
regions:
  - sa-saopaulo-1
compartments:
  - compartment_ocid: "ocid1.tenancy.oc1..xxxxxxxx" # ajuste no terraform.tfvars
filters:
  - display_name: "yvy-server"
compose:
  ansible_host: public_ip
  ansible_user: "'ubuntu'"
  ansible_ssh_private_key_file: "'~/.ssh/id_rsa'"
groups:
  yvy: "'yvy' in display_name"
