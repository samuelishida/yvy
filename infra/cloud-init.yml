#cloud-config
package_update: true
packages:
  - git
  - curl
  - ca-certificates
  - python3
  - python3-venv
  - python3-pip
  - redis-server
  - sqlite3
  - jq
  - htop
  - ncdu
  - ufw

runcmd:
  - systemctl enable redis-server
  - systemctl start redis-server

  # Configurar UFW
  - ufw default deny incoming
  - ufw default allow outgoing
  - ufw allow 22/tcp
  - ufw allow 5001/tcp
  - ufw allow 80/tcp
  - ufw allow 443/tcp
  - ufw --force enable

  # Swap para VM 1GB (necessário para npm build)
  - fallocate -l 2G /swapfile
  - chmod 600 /swapfile
  - mkswap /swapfile
  - swapon /swapfile
  - echo '/swapfile none swap sw 0 0' | tee -a /etc/fstab

  # Instalar nvm + Node 18 (Node 12 do apt é velho demais)
  - curl -o- https://raw.githubusercontent.com/nvm-sh/nvm/v0.39.7/install.sh | bash
  - export NVM_DIR="$HOME/.nvm" && [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh" && nvm install 18

  # Criar diretório do projeto
  - mkdir -p /opt/yvy
  - chown ubuntu:ubuntu /opt/yvy

final_message: "Yvy server setup complete. Baremetal runtime ready."
