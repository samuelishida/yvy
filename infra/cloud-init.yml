#cloud-config
package_update: true
packages:
  - git
  - curl
  - ca-certificates
  - python3
  - python3-venv
  - python3-pip
  - nodejs
  - npm
  - redis-server
  - sqlite3
  - jq
  - htop
  - ncdu
  - ufw

runcmd:
  - systemctl enable redis-server
  - systemctl start redis-server

  # Configurar UFW
  - ufw default deny incoming
  - ufw default allow outgoing
  - ufw allow 22/tcp
  - ufw allow 5001/tcp
  - ufw allow 80/tcp
  - ufw allow 443/tcp
  - ufw --force enable

  # Criar diretório do projeto
  - mkdir -p /opt/yvy
  - chown ubuntu:ubuntu /opt/yvy

final_message: "Yvy server setup complete. Baremetal runtime ready."
