<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.Default.css"/>
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.heat/dist/leaflet-heat.js"></script> <!-- Biblioteca do Leaflet para heatmap -->
    <script src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"></script>
    <title>Mapa de Desmatamento</title>
    <style>
        /* Faz o mapa preencher toda a tela */
        html, body {
            height: 100%;
            margin: 0;
        }
        #map {
            height: 100%;
            width: 100%;
        }
    </style>
</head>
<body>
    {% if map_error %}
    <div style="position: absolute; top: 12px; left: 12px; z-index: 1000; background: rgba(255,255,255,0.92); padding: 10px 14px; border-radius: 8px; font-family: sans-serif;">
        {{ map_error }}
    </div>
    {% endif %}
    <div id="map"></div>

<script>
    const initialData = {{ initial_data|default([], true)|tojson }};

    // Inicializa o mapa com visualização centrada no Brasil
    var map = L.map('map', {
        zoomControl: true  // Inclui o controle de zoom no mapa
    }).setView([-15.7801, -47.9292], 4);

    // Adiciona camada de mapa do OpenStreetMap
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
    }).addTo(map);

    // Grupo de marcadores para clusterização
    var markers = L.markerClusterGroup();
    var heatLayer = L.heatLayer([], { radius: 20, blur: 15, maxZoom: 10 }).addTo(map);
    map.addLayer(markers);

    function getDisplayColor(item) {
        if (item.display_color) {
            return item.display_color;
        }

        if (!item.timestamp) {
            return item.color || '#308703';
        }

        const year = new Date(item.timestamp).getFullYear();
        if (year >= 2020) {
            return 'orange';
        }
        if (year >= 2010) {
            return 'yellow';
        }
        if (year >= 2000) {
            return 'green';
        }
        return 'darkgreen';
    }

    function getHeatWeight(item) {
        if (typeof item.heat_weight === 'number') {
            return item.heat_weight;
        }

        if (!item.timestamp) {
            return 0.5;
        }

        const year = new Date(item.timestamp).getFullYear();
        if (year >= 2020) {
            return 0.8;
        }
        if (year >= 2010) {
            return 0.6;
        }
        if (year >= 2000) {
            return 0.4;
        }
        return 0.2;
    }

    function renderData(data) {
        let heatData = [];
        markers.clearLayers();

        data.forEach(item => {
            const markerColor = getDisplayColor(item);
            const heatWeight = getHeatWeight(item);
            heatData.push([item.lat, item.lon, heatWeight]);

            let marker = L.circleMarker([item.lat, item.lon], {
                radius: 6,
                color: markerColor,
                fillColor: markerColor,
                fillOpacity: 0.6
            }).bindPopup(
                `<b>${item.name}</b><br>` +
                `Classe: ${item.clazz || 'Desmatamento'}<br>` +
                `Fonte: ${item.source || 'TerraBrasilis'}<br>` +
                `Coordenadas: ${item.lat}, ${item.lon}<br>` +
                `Timestamp: ${item.timestamp || 'N/A'}`
            );

            markers.addLayer(marker);
        });

        heatLayer.setLatLngs(heatData);
    }

    // Função para carregar dados dinamicamente conforme a área do mapa
    function loadMapData(bounds) {
        const ne = bounds.getNorthEast();
        const sw = bounds.getSouthWest();

        // Chama o proxy do frontend para manter a chave de API fora do browser
        fetch(`/api/data?ne_lat=${ne.lat}&ne_lng=${ne.lng}&sw_lat=${sw.lat}&sw_lng=${sw.lng}`)
            .then(response => response.json())
            .then(data => renderData(data))
            .catch(error => console.error('Erro ao buscar os dados:', error));
    }

    // Carrega dados ao mover ou aplicar zoom no mapa
    map.on('moveend', function () {
        const bounds = map.getBounds();
        loadMapData(bounds);
    });

    if (initialData.length > 0) {
        renderData(initialData);
    } else {
        loadMapData(map.getBounds());
    }

    // Ajusta o tamanho do mapa ao redimensionar a janela do navegador
    window.addEventListener('resize', function () {
        map.invalidateSize();
    });

    // Adiciona a legenda ao mapa
    var legend = L.control({position: 'bottomright'});

    legend.onAdd = function (map) {
        var div = L.DomUtil.create('div', 'info legend');
        var labels = [
            {color: 'darkgreen', label: 'Antes de 2000'},
            {color: 'green', label: '2000 a 2009'},
            {color: 'yellow', label: '2010 a 2019'},
            {color: 'orange', label: '2020 ou mais recente'}
        ];

        labels.forEach(item => {
            div.innerHTML += `<i style="background:${item.color}; width: 18px; height: 18px; display: inline-block; margin-right: 5px;"></i>${item.label}<br>`;
        });

        return div;
    };

    legend.addTo(map);
</script>

</body>
</html>
